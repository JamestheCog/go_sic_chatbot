<!DOCTYPE html>
<html>
    <head>
        <!-- Items for the PWA -->
        <link rel = 'manifest' href = '/manifest.json'>
        <meta name = 'theme-color' content = '#0d6efd'>
        <script src = "/sw.js"> </script>

        <link rel = "stylesheet" href = "/static/css/signup/main.css"/>
        <link rel = "stylesheet" href = "/static/css/shared/alerts.css"/>
    </head>
    <body>
        <div class="new-user-container">
            <h1>Create New Account</h1>
            <p class="subtitle">Start facilitating serious illness conversations</p>

            <form id="newUserForm">
                <div class="form-group">
                    <label for="username">Username</label>
                    <input type="text" id="username" name="username" placeholder="Enter a username">
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" placeholder="Create a password">
                </div>

                <div class="form-group">
                    <label for="confirmPassword">Confirm Password</label>
                    <input type="password" id="confirmPassword" name="confirmPassword" placeholder="Confirm your password">
                </div>

                <button type="submit" class="btn-create">Create Account</button>
            </form>

            <div class="login-link">
                Already have an account? <a href="/login">Sign in</a>
            </div>
        </div>

        <!-- Alert Container (reuses the same system) -->
        <div id="alertContainer" class="alert-container"></div>

        <script defer src = "/static/js/signup/main.js"> </script>
        <script defer src = "/static/js/shared/alerts.js"> </script>
        <script defer src = "/static/js/shared/theme_toggler.js"> </script>
        <script defer src = "/static/js/shared/pwa.js"> </script>
    </body>
</html>
